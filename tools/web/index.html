<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SCIM - Stary człowiek i morze</title>
<style>
	body { margin: 0; min-height: 100vh; display: flex; flex-direction: column;
		align-items: center; justify-content: center; gap: 24px;
		background: #0b1825; color: #f5e6c4; font-family: system-ui, sans-serif; }
	h1 { font-size: 1.4rem; font-weight: 600; margin: 0 16px; text-align: center; }
	p  { margin: 0 24px; opacity: .8; text-align: center; }
	.buttons { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
	a.btn { padding: 14px 28px; border: 2px solid #f5e6c4; border-radius: 8px;
		color: #f5e6c4; text-decoration: none; font-size: 1.05rem; }
	a.btn:hover { background: rgba(245, 230, 196, .12); }
	small { opacity: .55; }
</style>
</head>
<body>
<h1>SCIM - Stary człowiek i morze</h1>
<p>Wybierz wersję gry:</p>
<div class="buttons">
	<a class="btn" id="btn-d" href="d/">Komputer (poziomo)</a>
	<a class="btn" id="btn-m" href="m/">Telefon (pionowo)</a>
</div>
<small>Wybór zostanie zapamiętany. Zmiana: wróć tu z parametrem <code>?wersja=wybor</code>.</small>
<script>
(function () {
	"use strict";
	var KEY = "scim_wariant";
	var params = new URLSearchParams(location.search);
	var forced = params.get("wersja"); // ?wersja=d | m | wybor

	function go(variant) {
		try { localStorage.setItem(KEY, variant); } catch (e) { /* prywatny tryb */ }
		location.replace(variant + "/");
	}

	// Zapamietaj wybor takze przy recznym kliknieciu przycisku.
	document.getElementById("btn-d").addEventListener("click", function (e) { e.preventDefault(); go("d"); });
	document.getElementById("btn-m").addEventListener("click", function (e) { e.preventDefault(); go("m"); });

	if (forced === "wybor") {
		try { localStorage.removeItem(KEY); } catch (e) { /* ignoruj */ }
		return; // pokaz strone wyboru, bez auto-przekierowania
	}
	if (forced === "d" || forced === "m") { go(forced); return; }

	var saved = null;
	try { saved = localStorage.getItem(KEY); } catch (e) { /* prywatny tryb */ }
	if (saved === "d" || saved === "m") { go(saved); return; }

	// Detekcja: urzadzenie dotykowe z "grubym" wskaznikiem -> wersja mobilna.
	var coarse = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
	var touch = (navigator.maxTouchPoints || 0) > 0;
	go(touch && coarse ? "m" : "d");
}());
</script>
</body>
</html>
